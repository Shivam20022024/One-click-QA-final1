version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - backend-node
      - backend

  backend-node:
    build:
      context: ./backend-node
    ports:
      - "3000:3000"
      - "5000:5000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
    # Add env vars as needed, e.g. for DB connections

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # Add env vars as needed
